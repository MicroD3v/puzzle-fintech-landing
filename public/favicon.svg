<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5070"/>
      <stop offset="100%" stop-color="#E0306A"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8099"/>
      <stop offset="100%" stop-color="#FF3060"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="8" fill="#0D0D10"/>

  <!-- Classic jigsaw puzzle piece, filling most of the canvas -->
  <!-- Top nub bumps up, Right nub bumps right, Bottom nub indents in, Left nub indents in -->
  <path d="
    M 5 5
    L 13.5 5
    Q 13.5 2, 16 2
    Q 18.5 2, 18.5 5
    L 27 5
    L 27 13.5
    Q 30 13.5, 30 16
    Q 30 18.5, 27 18.5
    L 27 27
    L 18.5 27
    Q 18.5 30, 16 30
    Q 13.5 30, 13.5 27
    L 5 27
    L 5 18.5
    Q 2 18.5, 2 16
    Q 2 13.5, 5 13.5
    Z
  " fill="url(#g1)"/>

  <!-- Top-left sheen -->
  <path d="M 5 5 L 18.5 5 L 18.5 6 Q 16 8, 13.5 6 L 6 6 L 6 18.5 Q 4 16, 5 13.5 Z" fill="white" opacity="0.08"/>
</svg>
